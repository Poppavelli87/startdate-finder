version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - SODA_APP_TOKEN=${SODA_APP_TOKEN:-}
      - WHOISXML_API_KEY=${WHOISXML_API_KEY:-}
      - FEATURE_SOCIAL_HINTS=${FEATURE_SOCIAL_HINTS:-0}
      - CORS_ALLOW_ORIGINS=${CORS_ALLOW_ORIGINS:-*}
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - VITE_API_PROXY_TARGET=http://backend:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

